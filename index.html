<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio</title>
    <link rel="stylesheet" href="/styles/global.css" />
  </head>
  <body class="login-body">
    <main class="login-page">
      <section class="login-card" aria-label="Ingreso">
        <img src="styles/resources/Logo-Ideem.png" alt="Logo IDEEM" class="logo" />
        <h1 class="login-title">Inventario IDEEM</h1>

        <form id="loginForm" class="login-form">
          <label for="codigo" class="login-label">Código</label>
          <input type="text" id="codigo" name="codigo" required />
          <button class="btn-envio" type="submit">Ingresar</button>
        </form>
      </section>
    </main>
    <script src="/scripts/validacion.js"></script>
  </body>
</html>
